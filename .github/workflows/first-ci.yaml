name: First CICD pipleline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: SSH into the server 
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_IP }}
          username: ${{ secrets.SSH_HOST }}
          key: ${{ secrets.SSH_SECRET_KEY }}
          script: |
            # go  to project directory
            cd ~/CICD-pipeline-using-github-actions

            # pull the latest code
            git pull origin main

            # stop previous container if exists
            docker stop gh-actions-container || true

            # remove previous container if exists
            docker rm gh-actions-container || true

            # remove previous image if exists
            docker rmi gh-actions-image || true

            # build the docker image
            docker build -t gh-actions-image .

            # run the container
            docker run -d -p 3000:80 --name gh-actions-container gh-actions-image